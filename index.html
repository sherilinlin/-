<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Valentine</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Noto Sans TC", sans-serif;
      background: #fff7fb;
      color: #1a1a1a;
    }

    .container {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      background: white;
      border: 1px solid #ffd6e7;
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,.08);
      padding: 22px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      letter-spacing: 1px;
    }

    .p {
      font-size: 16px;
      line-height: 1.7;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      border: 0;
      background: #ff4d8d;
      color: white;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
    }

    .btn:hover:not(:disabled) {
      background: #e6336e;
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:focus-visible {
      outline: 3px solid #b5005b;
      outline-offset: 3px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .small {
      opacity: .75;
      font-size: 13px;
      margin-top: 12px;
      transition: opacity 0.3s;
    }

    .hr {
      height: 1px;
      background: #ffe1ec;
      margin: 14px 0;
      border: 0;
    }

    .code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      background: #fff2f7;
      padding: 2px 8px;
      border-radius: 8px;
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card" id="card">
      <h1 id="title">男生情人節快樂 💗</h1>

      <div id="content" style="transition: opacity 0.3s;">
        <p class="p">有一個小禮物要給你～</p>
      </div>

      <button class="btn" id="btn">按這裡領取</button>

      <p class="small" id="hint">（再按一下會出現取貨資訊）</p>
    </div>
  </div>

  <script>
    let step = 0;

    const btn = document.getElementById("btn");
    const content = document.getElementById("content");
    const hint = document.getElementById("hint");

    btn.onclick = () => {
      step++;

      if (step === 1) {
        content.style.opacity = "0";
        setTimeout(() => {
          content.innerHTML = `
          <p class="p">請根據下列資訊領取你的情人節禮物 🎁</p>
          <hr class="hr">

          <p class="p">領取地點：<span class="code">7-11 新政門市</span></p>
          <p class="p">取貨人姓名：<span class="code">凃朝韡</span></p>

          <hr class="hr">
          <p class="p">希望男生新年很開心 🧧✨</p>
        `;
          content.style.opacity = "1";
        }, 300);

        btn.textContent = "嘿嘿";
        hint.textContent = "情人節快樂～";
      } else {
        btn.disabled = true;
      }
    };
  </script>
</body>
</html>
